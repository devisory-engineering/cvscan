name: cvscan

on:
  push:
    branches: [master]
    paths:
      - 'cmd/cvscan/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - 'cmd/cvscan/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build cvscan
        run: go build -o cvscan ./cmd/cvscan/
      - name: Run tests
        run: go test ./cmd/cvscan/ -v -count=1

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w -X=main.version=ci" -o "cvscan-${GOOS}-${GOARCH}${ext}" ./cmd/cvscan/
      - uses: actions/upload-artifact@v4
        with:
          name: cvscan-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cvscan-*
