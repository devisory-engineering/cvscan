version: 2

project_name: cvscan

builds:
  - id: cvscan
    main: ./cmd/cvscan
    binary: cvscan
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    tags:
      - gore2regex
    ldflags:
      - -s -w
      - -X=main.version={{.Version}}
      - -X=main.apiBaseURL={{.Env.CVSCAN_API_URL}}

archives:
  - id: cvscan-archive
    builds: [cvscan]
    name_template: "cvscan_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "cvscan_{{ .Version }}_checksums.txt"

release:
  prerelease: auto

brews:
  - ids: [cvscan-archive]
    repository:
      owner: devisory-engineering
      name: homebrew-cvscan
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/devisory-engineering/cvscan
    description: "Cloudvisor Security Scanner - secrets & IaC misconfiguration scanning"
    license: MIT
    install: |
      bin.install "cvscan"
    test: |
      assert_match version.to_s, shell_output("#{bin}/cvscan --version")
